<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bangla IPTV Player</title>  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    .container {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: #111827;
      border-right: 1px solid #1f2937;
      overflow-y: auto;
      padding: 15px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      text-align: center;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      background: #1f2937;
      color: white;
      outline: none;
    }

    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .channel-btn {
      background: #1f2937;
      border: none;
      color: white;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: 0.2s;
      font-size: 15px;
    }

    .channel-btn:hover {
      background: #2563eb;
    }

    .channel-btn.active {
      background: #2563eb;
    }

    .player-section {
      display: flex;
      flex-direction: column;
      padding: 15px;
    }

    .video-wrapper {
      background: black;
      border-radius: 14px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
    }

    video {
      width: 100%;
      height: 100%;
      background: black;
    }

    .channel-title {
      margin-top: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    .status {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar {
        height: 300px;
      }
    }
  </style></head>
<body><div class="container">  <div class="sidebar">
    <div class="logo">📺 IPTV Player</div><input
  type="text"
  id="search"
  class="search-box"
  placeholder="Search channel..."
/>

<div class="channel-list" id="channelList"></div>

  </div>  <div class="player-section">
    <div class="video-wrapper">
      <video id="video" controls autoplay playsinline></video>
    </div><div class="channel-title" id="channelTitle">
  Select a channel
</div>

<div class="status" id="status">
  Waiting for playback...
</div>

  </div></div><script>
const channels = [
  {
    name: 'BTV',
    url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8'
  },
  {
    name: 'ATN Bangla',
    url: 'https://tvsen5.aynaott.com/atnbangla/tracks-v1a1/mono.ts.m3u8'
  },
  {
    name: 'Channel I HD',
    url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1723/output/index.m3u8'
  },
  {
    name: 'Jamuna TV',
    url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1701/output/index.m3u8'
  },
  {
    name: 'Channel 24 HD',
    url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/index.m3u8'
  },
  {
    name: 'T Sports',
    url: 'https://tvsen7.aynaott.com/tsports-hd/index.m3u8'
  },
  {
    name: 'Star Sports 1',
    url: 'https://tvsen7.aynaott.com/sspts1/tracks-v1a1/mono.ts.m3u8'
  },
  {
    name: 'Al Jazeera',
    url: 'https://owrcovcrpy.gpcdn.net/bpk-tv/1721/output/index.m3u8'
  }
];

const video = document.getElementById('video');
const channelList = document.getElementById('channelList');
const channelTitle = document.getElementById('channelTitle');
const statusText = document.getElementById('status');
const searchInput = document.getElementById('search');

let hls;

function loadChannel(channel, button) {
  document.querySelectorAll('.channel-btn').forEach(btn => {
    btn.classList.remove('active');
  });

  if (button) button.classList.add('active');

  channelTitle.textContent = channel.name;
  statusText.textContent = 'Loading stream...';

  if (hls) {
    hls.destroy();
  }

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(channel.url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      video.play();
      statusText.textContent = 'Live';
    });

    hls.on(Hls.Events.ERROR, function () {
      statusText.textContent = 'Playback error';
    });
  }
  else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = channel.url;
    video.addEventListener('loadedmetadata', function () {
      video.play();
      statusText.textContent = 'Live';
    });
  }
  else {
    statusText.textContent = 'HLS not supported';
  }
}

function renderChannels(list) {
  channelList.innerHTML = '';

  list.forEach(channel => {
    const btn = document.createElement('button');

    btn.className = 'channel-btn';
    btn.textContent = channel.name;

    btn.onclick = () => loadChannel(channel, btn);

    channelList.appendChild(btn);
  });
}

searchInput.addEventListener('input', () => {
  const value = searchInput.value.toLowerCase();

  const filtered = channels.filter(ch =>
    ch.name.toLowerCase().includes(value)
  );

  renderChannels(filtered);
});

renderChannels(channels);
</script></body>
</html>
